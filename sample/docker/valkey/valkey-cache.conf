# valkey-cache — ephemeral store. Carries cache + queues + pub/sub
# (LIB_REDIS_*). Disposable: NO persistence, NO named volume — losing it
# costs a cold cache, nothing more.
#
# requirepass and maxmemory are supplied at runtime (secret file +
# per-instance env) — intentionally absent from this file.

bind 0.0.0.0
protected-mode yes
port 6379
tcp-keepalive 300
timeout 0

# ── No persistence ────────────────────────────────────────────────────────────
appendonly no
save ""

# ── Memory ────────────────────────────────────────────────────────────────────
# allkeys-lru: evicts the least-recently-used key under pressure, regardless
# of TTL. Safe for a pure cache; queue entries riding this connection are
# also evictable — an accepted tradeoff, not a bug.
maxmemory-policy allkeys-lru

# Evict keys in a background thread instead of blocking the main thread —
# smooths latency spikes under eviction pressure on this LRU instance.
lazyfree-lazy-eviction yes

# ── Logging ────────────────────────────────────────────────────────────────────
loglevel notice
logfile ""
