# valkey-state — durable store. Holds session data (db1) only.
#
# requirepass and maxmemory are supplied at runtime (secret file +
# per-instance env) — intentionally absent from this file.

bind 0.0.0.0
protected-mode yes
port 6379
tcp-keepalive 300
timeout 0

# ── Durability ────────────────────────────────────────────────────────────────
# AOF is authoritative; sessions must survive a restart.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# Keep periodic RDB snapshots alongside AOF for faster cold starts.
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# ── Memory ────────────────────────────────────────────────────────────────────
# noeviction: never silently drop sessions/queue entries. When memory is
# exhausted, writes fail loudly instead of corrupting durable state. maxmemory
# is injected at runtime from VALKEY_STATE_MAXMEMORY.
maxmemory-policy noeviction

# ── Logging ────────────────────────────────────────────────────────────────────
loglevel notice
logfile ""
