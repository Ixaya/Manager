; OPcache — production settings. validate_timestamps=0 means PHP never
; re-checks files on disk — a deploy must explicitly reload FPM or changed
; code won't be picked up.

opcache.enable=1
opcache.enable_cli=0
opcache.validate_timestamps=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=45000
opcache.save_comments=1

; JIT left disabled: no measured benefit for this request-bound workload and it
; removes a class of hard-to-debug crashes. Revisit with profiling if needed.
opcache.jit=off
opcache.jit_buffer_size=0

; APCu (user cache) is available for CACHE_ADAPTER=apc.
apc.enable_cli=0
