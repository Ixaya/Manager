; PHP runtime overrides — applied to FPM and CLI.

; ── Limits ─────────────────────────────────────────────────────────────────
; memory_limit is PER REQUEST. Do NOT size the container mem_limit from
; this value — size it from measured worker RSS.
memory_limit        = 256M
max_execution_time  = 60
max_input_time      = 60
upload_max_filesize = 32M
post_max_size       = 32M

; ── Errors → stderr (captured by the container log driver) ───────────────────
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /proc/self/fd/2
error_reporting        = E_ALL

; ── Timezone ─────────────────────────────────────────────────────────────────
date.timezone = UTC

; ── Sessions ───────────────────────────────────────────────────────────────
; Session data lives in Valkey (see CF_SESS_* / CF_SESS_SAVE_PATH); these are
; cookie hardening defaults. cookie_secure is left to the app config so plain
; HTTP works behind a TLS-terminating proxy in dev.
session.use_strict_mode  = 1
session.use_only_cookies = 1
session.cookie_httponly  = 1
session.cookie_samesite  = Lax

; ── disable_functions ─────────────────────────────────────────────────────────
; INTENTIONALLY EMPTY. Async jobs shell out via bin/cli_run.sh, which needs
; proc_open/exec. Do not populate this without removing that dependency.
disable_functions =

; ── Info disclosure ───────────────────────────────────────────────────────────
expose_php = Off

; ── Path resolution ───────────────────────────────────────────────────────────
; Disables PHP's own path-info guessing (doesn't affect PATH_INFO nginx
; passes explicitly, which CI3 routing relies on).
cgi.fix_pathinfo = 0
