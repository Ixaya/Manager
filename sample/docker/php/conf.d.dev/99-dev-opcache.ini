; Dev-bind override (docker-compose.dev-bind.yml). Loads after 20-opcache.ini
; alphabetically, so these directives win. Re-enables timestamp validation so
; edits to the bound host application/ tree are picked up on the next request
; with no FPM reload — the opposite of the production 20-opcache.ini default.

opcache.validate_timestamps=1
opcache.revalidate_freq=0
