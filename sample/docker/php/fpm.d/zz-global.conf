; FPM global overrides. Kept separate from the pool so it is never re-rendered
; by the entrypoint.
[global]
; FPM's own errors → container stderr (captured by the json-file log driver).
error_log = /proc/self/fd/2
daemonize = no
; Surface a worker that dies repeatedly instead of masking a crash loop.
emergency_restart_threshold  = 10
emergency_restart_interval   = 1m
process_control_timeout      = 10s
