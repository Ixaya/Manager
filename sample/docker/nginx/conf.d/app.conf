# Main application vhost — HTTP on :80 (TLS is terminated upstream by Traefik).
# Published to the host as $HTTP_PORT (see docker-compose.yml).

server {
    listen 80 default_server;
    server_name _;

    root  /var/www/html/public;
    index index.php;
    charset utf-8;

    # PHP-FPM upstream resolved via Docker DNS at request time so nginx starts
    # even if php is briefly unavailable.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $php_upstream php:9000;

    # ACME / Let's Encrypt challenge.
    location ^~ /.well-known/ {
        try_files $uri /;
    }

    # Static assets served directly by nginx (never hit PHP).
    # /assets/ is baked per IMAGE_TAG, so its content never changes under a
    # given URL — immutable is correct. /media/ is user-uploaded and mutable.
    location ~* ^/assets/ {
        try_files $uri =404;
        access_log off;
        expires    30d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security-headers.inc;
    }
    location ~* ^/media/ {
        try_files $uri =404;
        access_log off;
        expires    30d;
        add_header Cache-Control "public";
        include /etc/nginx/conf.d/security-headers.inc;
    }
    location = /favicon.ico { try_files $uri =404; access_log off; log_not_found off; }
    location = /robots.txt   { try_files $uri =404; access_log off; log_not_found off; }

    # Deny access to sensitive paths.
    location ~ /\.               { deny all; }
    location ~* composer\.(json|lock)$ { deny all; }
    location ^~ /application/     { deny all; }
    location ^~ /vendor/          { deny all; }

    # CI3 front-controller routing.
    location / {
        try_files $uri $uri/ /index.php?/$request_uri;
    }

    location ~ ^/index\.php(/|$) {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;

        fastcgi_pass  $php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        # Let CI3 know the original scheme (Cloudflare/Traefik set this header).
        fastcgi_param HTTPS           $fastcgi_https if_not_empty;
        # Belt-and-suspenders alongside expose_php=Off (10-app.ini): strips the
        # header if it's ever present anyway.
        fastcgi_hide_header X-Powered-By;

        fastcgi_connect_timeout 5s;
        fastcgi_read_timeout    60s;
        fastcgi_send_timeout    60s;
        fastcgi_buffer_size 16k;
        fastcgi_buffers     4 16k;
    }

    # Any other .php under public/ — deny outright rather than falling through
    # to location /'s try_files, which would serve it as raw source instead.
    location ~ \.php$ {
        deny all;
    }

    # FPM ping/status — internal networks only (used by monitoring; the Docker
    # HEALTHCHECK talks to FPM directly over FastCGI, not through here).
    location ~ ^/(status|ping)$ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        include fastcgi_params;
        fastcgi_pass  $php_upstream;
        fastcgi_param SCRIPT_FILENAME $fastcgi_script_name;
    }

    # Lightweight nginx liveness endpoint (used by the nginx HEALTHCHECK).
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        include /etc/nginx/conf.d/security-headers.inc;
        return 200 "ok\n";
    }
}
