# WebSocket reverse-proxy vhost — listens on :8080, published as $WS_PORT.
#
# Proxies to the `ws` service (Manager WebSocket server, internal :9008). The
# upstream is resolved at REQUEST time via Docker DNS + a variable in
# proxy_pass, so nginx starts cleanly even when the ws profile is not enabled
# (connections just fail until ws is up — expected).

server {
    listen 8080;
    server_name _;

    resolver         127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    location / {
        # Non-WebSocket requests get bounced (this vhost is upgrade-only).
        if ($http_upgrade = "") {
            return 426;   # Upgrade Required
        }

        set $ws_upstream ws:9008;
        proxy_pass http://$ws_upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 5s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }
}
