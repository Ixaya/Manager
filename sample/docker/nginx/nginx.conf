user  nginx;
worker_processes  auto;

# Per-worker FD ceiling. Must stay ≥ ~2× worker_connections (each proxied
# connection costs 2 FDs — client + upstream) plus headroom for open static
# files and logs. 4096 backs worker_connections 1024 with margin and sits far
# below any real host's hard limit (prod measured 524288), so it applies for
# real. nginx cannot raise its own hard limit without CAP_SYS_RESOURCE, so the
# container's ceiling is set alongside this in docker-compose.yml (nginx
# `ulimits.nofile`) — raise both together if you ever increase this. A
# locked-down sandbox that caps NOFILE below this logs a harmless [alert] and
# continues; it only bites at concurrency a sandbox never reaches.
# See decisions.md "Concurrency sizing".
worker_rlimit_nofile 4096;

# Old workers force-close 30s after a reload (WS connections included —
# clients are expected to reconnect). Without this, a reload can leave a
# full duplicate worker set alive for the longest connection's lifetime.
worker_shutdown_timeout 30s;

# Log to the container's stderr directly (works under a read-only rootfs).
error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events {
    # Max simultaneous connections PER worker (× worker_processes = total).
    # Sized for a ~200-user internal portal: up to ~200 long-lived WebSocket
    # connections (held up to 3600s — see conf.d/ws.conf — so they accumulate)
    # plus brief HTTP bursts. 1024/worker means even a single-core container
    # (auto → 1 worker) covers all 200 WS with generous HTTP headroom.
    # WebSockets proxy to the `ws` service, never to PHP-FPM, so they count
    # here but never against pm.max_children. See decisions.md.
    worker_connections 1024;
    multi_accept       on;
    use                epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging → stdout/stderr (json-file driver captures these) ──────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    client_max_body_size        32m;
    large_client_header_buffers 4 8k;

    # Temp paths under /var/cache/nginx (tmpfs at runtime — read-only rootfs).
    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path       /var/cache/nginx/proxy_temp;
    fastcgi_temp_path     /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path       /var/cache/nginx/uwsgi_temp;
    scgi_temp_path        /var/cache/nginx/scgi_temp;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    include /etc/nginx/conf.d/security-headers.inc;

    # ── Real client IP ─────────────────────────────────────────────────────────
    # Trusts private Docker/Traefik ranges via X-Forwarded-For. NARROW
    # set_real_ip_from to the Traefik source address in production.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # WebSocket upgrade map (referenced by conf.d/ws.conf).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Normalizes X-Forwarded-Proto to exactly "on"/"" for the HTTPS fastcgi_param
    # (conf.d/app.conf) — CI3's is_https() treats any non-empty value as secure,
    # so passing the raw header through would misread plain HTTP as HTTPS.
    map $http_x_forwarded_proto $fastcgi_https {
        default "";
        https   "on";
    }

    include /etc/nginx/conf.d/*.conf;
}
